<!DOCTYPE html>
<html lang="en">
<head>

  <!-- ============================================
       META TAGS — tells browser how to read this
  ============================================ -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NextSkill Academy — AI and Technology 
  education for students in Visakhapatnam. Where Future Skills Begin." />

  <!-- Page title — shows in browser tab -->
  <title>NextSkill Academy</title>

  <!-- ============================================
       GOOGLE FONTS — Inter (our brand font)
  ============================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- ============================================
       FONT AWESOME — for icons throughout site
  ============================================ -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>

    /* ============================================
       CSS VARIABLES — your entire brand in one place
       Change a color here = changes everywhere
    ============================================ */
    :root {
      --black-primary:   #0A0A0A;   /* main background */
      --black-secondary: #111827;   /* card backgrounds */
      --black-tertiary:  #1F2937;   /* borders, dividers */
      --blue-primary:    #1C6FEB;   /* electric blue — main accent */
      --blue-hover:      #3B8EFF;   /* blue on hover */
      --blue-subtle:     rgba(28, 111, 235, 0.15); /* blue tint bg */
      --white:           #FFFFFF;
      --text-primary:    #FFFFFF;   /* main text */
      --text-muted:      #9CA3AF;   /* secondary text */
      --text-dark:       #6B7280;   /* least important text */
      --border-color:    #1F2937;   /* subtle borders */

      --font-main: 'Inter', sans-serif;

      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  16px;
      --radius-xl:  24px;

      --transition: all 0.3s ease;

      --max-width: 1200px;          /* max content width */
      --section-padding: 100px 0;   /* vertical breathing room */
    }

    /* ============================================
       CSS RESET — removes ugly browser defaults
       Every browser adds its own margins/paddings
       This wipes them so we start from zero
    ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box; /* padding doesn't add to width */
    }

    html {
      scroll-behavior: smooth; /* smooth scroll when clicking nav links */
    }

    body {
      font-family: var(--font-main);
      background-color: var(--black-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden; /* no horizontal scroll ever */
    }

    /* remove default list styles */
    ul, ol {
      list-style: none;
    }

    /* remove default link styles */
    a {
      text-decoration: none;
      color: inherit;
    }

    /* images never overflow their container */
    img {
      max-width: 100%;
      display: block;
    }

    /* ============================================
       REUSABLE UTILITY CLASSES
       These are helper classes you'll use 
       across every section
    ============================================ */

    /* centers content and limits max width */
    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
    }

    /* standard section spacing */
    .section {
      padding: var(--section-padding);
    }

    /* section headings style */
    .section-title {
      font-size: 36px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 12px;
    }

    /* section subtitle style */
    .section-subtitle {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 560px;
      margin-bottom: 48px;
    }

    /* electric blue highlight for key words */
    .highlight {
      color: var(--blue-primary);
    }

    /* primary button style */
    .btn-primary {
      display: inline-block;
      background: var(--blue-primary);
      color: var(--white);
      padding: 12px 28px;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-primary:hover {
      background: var(--blue-hover);
      transform: translateY(-2px);
    }

    /* outlined button style */
    .btn-outline {
      display: inline-block;
      background: transparent;
      color: var(--blue-primary);
      padding: 12px 28px;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 500;
      border: 1.5px solid var(--blue-primary);
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-outline:hover {
      background: var(--blue-subtle);
      transform: translateY(-2px);
    }

    /* ============================================
       IMAGE PLACEHOLDER STYLE
       Shows a dashed box wherever we need 
       a real image later
    ============================================ */
    .img-placeholder {
      background: var(--black-secondary);
      border: 2px dashed var(--black-tertiary);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-dark);
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }

    .img-placeholder i {
      font-size: 28px;
      color: var(--blue-primary);
      opacity: 0.5;
    }

  </style>

</head>
